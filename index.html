<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'"
    />
    <title>down - YouTube Downloader</title>
    <link rel="icon" type="image/png" href="assets/icons/icon-16x16.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #1e1e1e;
        color: #e0e0e0;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #fff;
        font-size: 28px;
      }
      .input-section {
        background: #2d2d2d;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid #3d3d3d;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #b0b0b0;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        background: #1e1e1e;
        border: 1px solid #3d3d3d;
        color: #e0e0e0;
        border-radius: 4px;
        font-size: 14px;
        margin-bottom: 15px;
      }
      input[type="text"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #0078d4;
        box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
      }

      .proxy-auth-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        align-items: flex-start;
      }
      .proxy-auth-row > div {
        width: 100%;
      }
      .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        flex: 1;
        min-width: 150px;
        padding: 12px 20px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #106ebe;
      }
      button:active {
        background: #0d5ba8;
      }
      button:disabled {
        background: #505050;
        cursor: not-allowed;
      }
      .audio-only {
        background: #17a2b8;
      }
      .audio-only:hover {
        background: #138496;
      }

      .proxy-btn {
        background: #6c757d;
      }
      
      .proxy-btn:hover {
        background: #5a6268;
      }
      .logs-section {
        background: #1e1e1e;
        border: 1px solid #3d3d3d;
        border-radius: 8px;
        padding: 15px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
      }
      .logs-title {
        color: #b0b0b0;
        margin-bottom: 10px;
        font-weight: 600;
      }
      #logs {
        background: #0d1117;
        color: #58a6ff;
        padding: 12px;
        border-radius: 4px;
        height: 350px;
        overflow-y: auto;
        line-height: 1.5;
        word-wrap: break-word;
        white-space: pre-wrap;
      }
      .status {
        margin-top: 15px;
        padding: 10px;
        border-radius: 4px;
        text-align: center;
        display: none;
      }
      .status.show {
        display: block;
      }
      .status.success {
        background: #28a745;
        color: white;
      }
      .status.error {
        background: #dc3545;
        color: white;
      }
      .status.info {
        background: #17a2b8;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📥 YouTube Downloader</h1>
      
      <div class="input-section">
        <label for="urlInput">URL del Video:</label>
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
        
        <div class="buttons">
          <button id="downloadBtn">Descargar Video</button>
          <button id="audioBtn" class="audio-only">Descargar Audio MP3</button>
          <button id="proxybtn" class="proxy-btn">🌐 Configurar un proxy</button>
          <button id="stopBtn" class="stop-btn" style="display: none; background: #dc3545;">⏹️ Parar Descarga</button>
        </div>
        <div id="status" class="status"></div>
        <div id="downloadProgress" class="progress-container" style="display: none;">
          <div class="progress-track">
            <div id="progressBar" class="progress-fill"></div>
          </div>
          <div id="progressLabel" class="progress-label">0%</div>
        </div>
      </div>
      <div id="proxyConfig" class="input-section" style="display: none;">
        <label for="proxyAddress" style="margin-top: 15px;">Dirección del proxy HTTP:</label>
        <input type="text" id="proxyAddress" placeholder="Ej: 10.0.0.1:8080" />
        <div class="proxy-auth-row">
          <div>
            <label for="username" style="margin-top: 15px;">Nombre de Usuario:</label>
            <input type="text" id="username" placeholder="usuario" />
          </div>
          <div>
            <label for="password" style="margin-top: 15px;">Contraseña:</label>
            <input type="password" id="password" placeholder="contraseña" />
          </div>
        </div>

        <button id="saveProxyBtn" class="proxy-btn">💾 Guardar Proxy</button>
        <button id="cancelProxyBtn" class="proxy-btn">❌Cancelar</button>
        <button id="clearProxyBtn" class="proxy-btn" style="display:none; background: #dc3545;">🧹 Eliminar proxy</button>
      </div>

      <div class="logs-section">
        <div class="logs-title">📋 Logs</div>
        <div id="logs"></div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
